<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Roulette tactile - Analyseur Avancé</title>
<style>
  :root {
    --bg: #0d1321;
    --panel: #15202f;
    --panel-alt: #1e283b;
    --text: #eef3ff;
    --muted: #8fa5c2;
    --border: rgba(255,255,255,0.14);
    --red: #d33c45;
    --black: #111;
    --green: #28d07f;
    --street1: rgba(255,190,50,0.35);
    --street2: rgba(84,180,255,0.35);
    --street3: rgba(173,90,255,0.35);
    --street4: rgba(255,105,135,0.35);
    --street5: rgba(72,220,170,0.35);
    --street6: rgba(255,155,70,0.35);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: Inter, system-ui, sans-serif;
    color: var(--text);
    background: radial-gradient(circle at top, #182540 0%, #0c1221 45%, #070a12 100%);
    overflow-x: hidden;
  }

  .app {
    max-width: 1400px;
    margin: auto;
    padding: 18px;
    display: grid;
    gap: 18px;
  }

  .title {
    margin: 0;
    text-align: center;
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: 1px;
  }

  /* minmax(0, ...) empêche l'élargissement des colonnes par leur contenu */
  .layout {
    display: grid;
    gap: 16px;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 18px;
    box-shadow: 0 22px 50px rgba(0,0,0,0.22);
    min-width: 0; /* Empêche les éléments enfants de forcer l'élargissement */
  }

  .panel h2 {
    margin: 0 0 14px;
    font-size: 1.15rem;
    font-weight: 700;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding-bottom: 8px;
  }

  /* Grille tactile */
  .roulette-board {
    display: grid;
    gap: 8px;
    grid-template-columns: 90px repeat(3, minmax(0, 1fr));
    grid-auto-rows: 54px;
    max-width: 520px;
    margin: auto;
  }

  .roulette-board button {
    position: relative;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.10);
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .15s ease, border-color .15s ease;
    background: rgba(255,255,255,0.04);
    overflow: hidden;
    color: var(--text);
  }

  .roulette-board button:hover,
  .roulette-board button:focus-visible {
    transform: translateY(-1px);
    box-shadow: 0 10px 18px rgba(0,0,0,0.22);
    outline: none;
  }

  .roulette-board button.num-red { background: var(--red); color: #fff; }
  .roulette-board button.num-black { background: var(--black); color: #fff; }
  .roulette-board button.num-green { background: var(--green); color: #071405; }

  .roulette-board button.probable {
    border-color: #ffbe32;
    box-shadow: 0 0 0 3px rgba(255, 190, 50, 0.4);
  }

  .roulette-board button.street-1 { box-shadow: inset 0 0 0 4px rgba(255,190,50,0.55); }
  .roulette-board button.street-2 { box-shadow: inset 0 0 0 4px rgba(84,180,255,0.55); }
  .roulette-board button.street-3 { box-shadow: inset 0 0 0 4px rgba(173,90,255,0.55); }
  .roulette-board button.street-4 { box-shadow: inset 0 0 0 4px rgba(255,105,135,0.55); }
  .roulette-board button.street-5 { box-shadow: inset 0 0 0 4px rgba(72,220,170,0.55); }
  .roulette-board button.street-6 { box-shadow: inset 0 0 0 4px rgba(255,155,70,0.55); }

  .roulette-board button.street-1::after,
  .roulette-board button.street-2::after,
  .roulette-board button.street-3::after,
  .roulette-board button.street-4::after,
  .roulette-board button.street-5::after,
  .roulette-board button.street-6::after {
    content: attr(data-street);
    position: absolute;
    top: 4px;
    right: 4px;
    font-size: 0.62rem;
    font-weight: 800;
    color: #111;
    background: rgba(255,255,255,0.95);
    border-radius: 999px;
    padding: 1px 5px;
    pointer-events: none;
  }

  .zero-cell { grid-column: 1 / span 1; grid-row: 1 / span 1; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
  }

  .btn-clear {
    border: none;
    border-radius: 14px;
    padding: 12px 20px;
    background: #375b8a;
    color: var(--text);
    cursor: pointer;
    font-weight: 700;
    transition: background 0.15s;
  }
  .btn-clear:hover { background: #476d9e; }

  .info-block { color: var(--muted); font-size: 0.88rem; }

  /* Grille des analyses sur 2, 3 ou 4 colonnes */
  .summary-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  @media(min-width: 1300px) {
    .summary-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media(min-width: 1600px) {
    .summary-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  }

  .card {
    background: var(--panel-alt);
    border-radius: 20px;
    padding: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    min-width: 0; /* Évite l'étirement des sous-cartes */
  }

  .card h3 {
    margin: 0 0 12px;
    color: #79b7ff;
    font-size: 0.95rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
